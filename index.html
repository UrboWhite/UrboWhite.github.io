<!DOCTYPE html>
<html lang="sr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metasistem - Urbo White</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/showdown/2.1.0/showdown.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="bg-black text-[#e5e5e5] font-sans selection:bg-white selection:text-black">

    <div id="progress-container" class="fixed top-0 left-0 w-full h-1 z-[60] bg-zinc-900">
        <div id="progress-bar" class="h-full bg-white transition-all duration-150" style="width: 0%"></div>
    </div>

    <header class="fixed top-1 left-0 w-full bg-black/80 backdrop-blur-md border-b border-zinc-800 z-50 px-4 py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <button id="mobile-menu-btn" class="md:hidden flex items-center gap-2 text-xs uppercase tracking-widest font-bold border border-zinc-700 px-3 py-1 rounded">
                <span>Sadržaj</span>
            </button>
            
            <div class="hidden md:flex gap-4">
                <a href="https://orcid.org/0009-0005-9619-4843" target="_blank" class="header-btn">ORCID</a>
                <a href="https://doi.org/10.5281/zenodo.18911028" target="_blank" class="header-btn">DOI</a>
            </div>

            <div class="flex gap-3">
                <button onclick="toggleSearch()" class="header-btn">🔍 Pretraga</button>
                <button onclick="downloadPDF()" class="header-btn bg-white !text-black border-white hover:bg-transparent hover:!text-white">📄 PDF</button>
            </div>
        </div>
    </header>

    <div id="search-modal" class="fixed inset-0 bg-black/95 z-[70] hidden flex items-center justify-center p-6">
        <div class="w-full max-w-2xl">
            <input type="text" id="search-input" placeholder="Unesite pojam za pretragu..." class="w-full bg-transparent border-b-2 border-zinc-700 text-3xl py-4 focus:outline-none focus:border-white transition-colors">
            <button onclick="toggleSearch()" class="mt-8 text-xs uppercase tracking-widest text-zinc-500 hover:text-white">Zatvori (Esc)</button>
        </div>
    </div>

    <div class="flex flex-col md:flex-row pt-16">
        <aside id="sidebar" class="fixed inset-y-0 left-0 transform -translate-x-full md:translate-x-0 md:sticky md:top-16 md:h-[calc(100vh-64px)] md:w-72 w-64 bg-black border-r border-zinc-800 p-8 transition-transform duration-300 z-[55] overflow-y-auto">
            <h2 class="text-[10px] uppercase tracking-[0.3em] text-zinc-500 mb-6 font-bold">Poglavlja</h2>
            <nav id="menu" class="space-y-2 text-sm text-zinc-400">
                </nav>
        </aside>

        <main class="flex-1 px-6 py-12 md:px-20 lg:px-32 max-w-5xl mx-auto">
            <article id="content" class="prose prose-invert prose-headings:font-serif prose-p:leading-relaxed prose-blockquote:border-white prose-blockquote:bg-zinc-900/20 max-w-none">
                <p class="animate-pulse italic">Inicijalizacija metasistema...</p>
            </article>

            <footer class="mt-32 pb-16 border-t border-zinc-900 pt-12 flex flex-col items-center gap-4">
                <p class="text-[10px] uppercase tracking-widest text-zinc-600">Kontakt Autor</p>
                <a href="mailto:urbo.white1@gmail.com" class="text-xl hover:text-blue-400 transition-colors font-light">urbo.white1@gmail.com</a>
                <p class="text-[9px] text-zinc-700 mt-8 uppercase tracking-tighter">© 2026 Teorija Metasistema</p>
            </footer>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
